services:
  # Production overrides

  db:
    ports: []
    mem_limit: 2048m
    cpus: 2.0

  redis:
    ports: []
    mem_limit: 256m
    cpus: 0.5

  backend:
    volumes:
      - ./data/storage:/data/storage
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -b 0.0.0.0:8000
      --workers 2
      --timeout 120
      --access-logfile -
      --error-logfile -
    environment:
      DEBUG: "false"
      STORAGE_PATH: /data/storage
      # If no provider is set in .env, default to mock so "production ready to test" doesn't
      # hard-require external API keys.
      VISION_PROVIDER: ${VISION_PROVIDER:-mock}
    mem_limit: 1024m
    cpus: 1.0

  celery_worker:
    volumes:
      - ./data/storage:/data/storage
    environment:
      STORAGE_PATH: /data/storage
      VISION_PROVIDER: ${VISION_PROVIDER:-mock}
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    mem_limit: 1024m
    cpus: 1.0

  flower:
    ports:
      - "5555:5555"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes: []
    command: []
    ports:
      - "3000:80"
    environment: {}
    mem_limit: 256m
    cpus: 0.5
